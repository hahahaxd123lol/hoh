<!DOCTYPE html>
<html lang="en">
<head>
                            <style>
                            body.locked {
                                overflow: hidden;
                            }

                            body.locked .container,
                            body.unlocking .container {
                                opacity: 0;
                                transform: translateY(32px) scale(0.985);
                                filter: none;
                                pointer-events: none;
                                user-select: none;
                            }

                            body.unlocked .container {
                                opacity: 1;
                                transform: translateY(0) scale(1);
                                filter: none;
                                pointer-events: auto;
                            }

                            #passwordOverlay {
                                position: fixed;
                                inset: 0;
                                z-index: 10000;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                flex-direction: column;
                                background: rgba(10, 10, 10, 0.64);
                                backdrop-filter: none;
                                opacity: 1;
                                transition: opacity 2600ms cubic-bezier(.4, 0, .2, 1);
                            }

                            #passwordOverlay.hidden {
                                opacity: 0;
                                pointer-events: none;
                            }

                            body.protected-ui {
                                -webkit-touch-callout: none;
                                -webkit-tap-highlight-color: transparent;
                            }

                            body.protected-ui *:not(input):not(textarea):not(select) {
                                user-select: none;
                                -webkit-user-select: none;
                            }

                            body.protected-ui img,
                            body.protected-ui video {
                                -webkit-user-drag: none;
                            }
                            </style>

        .btn-submit,

        .btn-submit:disabled {

        .btn-reset {

        .loading {

            background: rgba(10, 10, 10, 0.7);

            margin-bottom: 20px;

            box-shadow: 0 0 8px #4caf5033;
            animation: purpleGlow 2.5s linear infinite;

        .success-message.show {
            display: block;
        }
        .error-message {
            display: none;
            padding: 15px;
            background: rgba(10, 10, 10, 0.7);
            border: 1.5px solid #a259ff;
            border-radius: 8px;
            color: #a259ff;
            margin-bottom: 20px;

        .serious-warning {

        @media (max-width: 600px) {
            .container {

<body class="locked protected-ui">
                        <video id="bgVideo" autoplay loop muted playsinline preload="auto" draggable="false">
                            <source src="bg.mp4" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
    <!-- Password overlay is now a direct child of body, not inside main site container -->
    <div id="passwordOverlay">
        <div style="background:rgba(24,24,27,0.74);border-radius:16px;box-shadow:0 0 40px 0 #a259ff44,0 2px 8px #000a;padding:40px 32px 32px 32px;border:2px solid #a259ff;max-width:90vw;width:350px;text-align:center;">
            <h2 style="color:#a259ff;font-family:'Fira Mono',monospace;margin-bottom:18px;">Half Off Hub</h2>
            <div class="key-input-wrapper">
                <img src="key.png" alt="key icon" class="key-icon" draggable="false">
                <input id="passwordInput" type="password" placeholder="Message Me For Key" style="width:100%;padding:13px 14px;border:1.5px solid #a259ff;border-radius:8px;font-size:15px;font-family:'Fira Mono',monospace;background:rgba(16,16,20,0.78);color:#fff;" autofocus>
            </div>
            <button id="passwordBtn" style="width:100%;padding:13px 0;background:#a259ff;color:#fff;border:none;border-radius:8px;font-size:16px;font-family:'Fira Mono',monospace;font-weight:700;cursor:pointer;">Enter</button>
            <div id="passwordError" style="color:#ff003c;margin-top:12px;position:relative;top:6px;display:none;font-family:'Fira Mono',monospace;font-size:14px;">Incorrect Key. Piss off.</div>
        </div>
    </div>
        <audio id="instant-audio" preload="auto" loop style="display:none;">
            <source src="tune.mp3" type="audio/mpeg">
        </audio>
        <div id="toolMount"></div>

        <script>
            var audio = document.getElementById('instant-audio');
            var bgVideo = document.getElementById('bgVideo');
            var toolMount = document.getElementById('toolMount');
            var played = false;
            var toolLoaded = false;
            window.__siteAccessToken = '';

            audio.loop = true;

            function playTune() {
                if (!played) {
                    audio.currentTime = 0;
                    audio.play();
                    played = true;
                }
            }

            function executeInjectedScripts(root) {
                var scripts = Array.from(root.querySelectorAll('script'));
                scripts.forEach(function(oldScript) {
                    var newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(function(attribute) {
                        newScript.setAttribute(attribute.name, attribute.value);
                    });
                    newScript.textContent = oldScript.textContent;
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            }

            async function loadProtectedTool(toolHtml) {
                if (toolLoaded) {
                    return true;
                }

                if (typeof toolHtml !== 'string' || toolHtml.length === 0) {
                    throw new Error('Protected tool payload missing. Restart with node server.js.');
                }

                try {
                    toolMount.innerHTML = toolHtml;
                    executeInjectedScripts(toolMount);
                    toolLoaded = true;
                    return true;
                } catch (error) {
                    toolMount.innerHTML = '';
                    throw error;
                }
            }

            window.addEventListener('DOMContentLoaded', function() {
                function ensureBgVideoPlayback() {
                    if (!bgVideo) return;
                    bgVideo.muted = true;
                    bgVideo.defaultMuted = true;
                    var playAttempt = bgVideo.play();
                    if (playAttempt && typeof playAttempt.catch === 'function') {
                        playAttempt.catch(function() {});
                    }
                }

                function showOverlay() {
                    window.__siteAccessToken = '';
                    document.getElementById('passwordOverlay').style.display = 'flex';
                    document.getElementById('passwordOverlay').classList.remove('hidden');
                    document.body.classList.remove('unlocking', 'unlocked');
                    document.body.classList.add('locked');
                    document.body.style.overflow = 'hidden';
                }

                function hideOverlay() {
                    document.getElementById('passwordOverlay').style.display = 'none';
                    document.body.classList.remove('locked', 'unlocking');
                    document.body.classList.add('unlocked');
                    document.body.style.overflow = '';
                }

                var overlay = document.getElementById('passwordOverlay');
                var input = document.getElementById('passwordInput');
                var btn = document.getElementById('passwordBtn');
                var error = document.getElementById('passwordError');

                try {
                    localStorage.removeItem('sitePasswordObj');
                    localStorage.removeItem('siteLoggedIn');
                } catch (e) {
                    // Ignore storage errors.
                }

                ensureBgVideoPlayback();
                bgVideo.addEventListener('loadeddata', ensureBgVideoPlayback, { once: true });
                bgVideo.addEventListener('canplay', ensureBgVideoPlayback);

                async function startUnlockTransition(toolHtml) {
                    error.style.display = 'none';

                    try {
                        await loadProtectedTool(toolHtml);
                    } catch (loadError) {
                        error.textContent = loadError && loadError.message ? loadError.message : 'Protected tool failed to load.';
                        error.style.display = 'block';
                        btn.disabled = false;
                        return false;
                    }

                    document.body.classList.remove('locked');
                    document.body.classList.add('unlocking');
                    overlay.classList.add('hidden');
                    setTimeout(function() {
                        hideOverlay();
                    }, 2600);
                    return true;
                }

                async function requestJson(url, options) {
                    var response = await fetch(url, {
                        credentials: 'same-origin',
                        ...options
                    });

                    var contentType = response.headers.get('content-type') || '';
                    var isJson = contentType.toLowerCase().includes('application/json');
                    var data = null;
                    var text = '';

                    if (isJson) {
                        try {
                            data = await response.json();
                        } catch (e) {
                            data = null;
                        }
                    } else {
                        try {
                            text = await response.text();
                        } catch (e) {
                            text = '';
                        }
                    }

                    return { response: response, data: data, isJson: isJson, text: text };
                }

                async function syncAuthState() {
                    showOverlay();
                    input.focus();
                }

                async function checkPassword() {
                    playTune();

                    var attempted = input.value.trim();
                    if (!attempted) {
                        input.focus();
                        return;
                    }

                    btn.disabled = true;
                    error.style.display = 'none';

                    try {
                        var result = await requestJson('/api/unlock', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ password: attempted })
                        });

                        if (result.response.ok && result.data && result.data.success) {
                            input.value = '';
                            window.__siteAccessToken = typeof result.data.siteAccessToken === 'string' ? result.data.siteAccessToken : '';
                            if (!(await startUnlockTransition(result.data.toolHtml))) {
                                return;
                            }
                            return;
                        }

                        if (!result.isJson || result.response.status === 404 || result.text.includes('Cannot POST')) {
                            error.textContent = 'Wrong server version is running. Close the old Node server and start node server.js.';
                        } else if (result.response.ok && result.data && result.data.success && !result.data.toolHtml) {
                            error.textContent = 'Protected tool payload missing. Restart with node server.js.';
                        } else {
                            error.textContent = (result.data && result.data.message) || 'Incorrect Key. Piss off.';
                        }
                    } catch (e) {
                        error.textContent = 'Secure key check unavailable. Start the site with node server.js.';
                    }

                    error.style.display = 'block';
                    input.value = '';
                    input.focus();
                    btn.disabled = false;
                }

                btn.addEventListener('click', checkPassword);
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        checkPassword();
                    }
                });

                showOverlay();
                syncAuthState();
            });
        </script>
</body>
</html>
